<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>РП ПОРТАЛ ДБР</title>

<style>
body{
font-family:Arial;
background:green;
color:white;
text-align:center;
margin:0;
}

.card{
padding:10px;
margin:10px;
background:rgba(0,0,0,0.3);
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
width:80%;
max-width:300px;
}
.hidden{display:none;}
</style>
</head>

<body>

<h1>🚔 РП ПОРТАЛ ДБР</h1>

<div id="auth" class="card">
<h3>Вхід</h3>
<input id="username" placeholder="Нік">
<input id="password" type="password" placeholder="Пароль">
<button onclick="login()">Вхід</button>
</div>

<div id="panel" class="hidden">

<h2>Профіль</h2>
<p id="info"></p>
<h3>DB: <span id="db"></span></h3>

<button onclick="logout()">Вийти</button>

</div>

<script>

let user = null;
let users = JSON.parse(localStorage.getItem("users") || "[]");

function save(){
localStorage.setItem("users", JSON.stringify(users));
}

function login(){
let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

let found = users.find(x => x.username === u && x.password === p);

if(!found){
alert("Невірно");
return;
}

user = found;

document.getElementById("auth").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");

document.getElementById("info").innerText = user.username;
document.getElementById("db").innerText = user.db;
}

function logout(){
location.reload();
}

</script>

</body>
</html>
