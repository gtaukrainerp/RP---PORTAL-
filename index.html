<script>

let user=null;
let users=JSON.parse(localStorage.getItem("users")||"[]");

function save(){
localStorage.setItem("users",JSON.stringify(users));
}

// REGISTER
function register(){

let u={
username:username.value,
rank:rank.value,
badge:badge.value,
car:car.value,
telegram:tg.value,
tgname:tgname.value,
roblox:roblox.value,
password:password.value
};

if(!u.username||!u.password){
alert("Заповни дані");
return;
}

if(users.find(x=>x.username==u.username)){
alert("Існує");
return;
}

u.db=0;
u.bg="green";

users.push(u);
save();
alert("OK");
}

// LOGIN
function login(){

let found=users.find(x=>x.username==username.value && x.password==password.value);

if(!found){
alert("Невірно");
return;
}

user=found;

auth.classList.add("hidden");
panel.classList.remove("hidden");

document.body.style.background=user.bg;
updateUI();
}

// UI
function updateUI(){
info.innerText=
Ім'я: ${user.username}
Звання: ${user.rank}
Жетон: ${user.badge}
Авто: ${user.car}
Telegram: ${user.telegram}
Тг нік: ${user.tgname}
Roblox: ${user.roblox};

db.innerText=user.db;
}

// BUY
function buy(color,price){
if(user.db<price)return alert("Нема DB");

user.db-=price;
user.bg=color;

document.body.style.background=color;
save();
updateUI();
}

// BG
function setBg(c){
user.bg=c;
document.body.style.background=c;
save();
}

// ADMIN DB

// ADMIN FULL
function adminUpdate(){
if(adminPass.value!="DBR2026")return alert("NO");

let t=users.find(x=>x.username==target.value);
if(!t)return;

if(newRank.value) t.rank=newRank.value;
if(newBadge.value) t.badge=newBadge.value;
if(newCar.value) t.car=newCar.value;

}

// TABS
function openTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}
