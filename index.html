<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>РП ПОРТАЛ ДБР</title>

<style>
body{
font-family:Arial,sans-serif;
background:green;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:rgba(0,0,0,.3);
padding:15px;
border-radius:12px;
margin:auto;
max-width:400px;
}

input,button{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
cursor:pointer;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<h1>🚔 РП ПОРТАЛ ДБР</h1>

<div id="auth" class="card">

<input id="username" placeholder="Ім'я">
<input id="rank" placeholder="Звання">
<input id="badge" placeholder="Жетон">
<input id="car" placeholder="Номер авто">
<input id="password" type="password" placeholder="Пароль">

<button onclick="registerUser()">Реєстрація</button>
<button onclick="loginUser()">Вхід</button>

</div>

<div id="portal" class="card hidden">

<h2>Профіль</h2>

<div id="profile"></div>

<h3>DB: <span id="db">0</span></h3>

<button onclick="buyTheme('green',0)">Зелений</button>
<button onclick="buyTheme('blue',500)">Синій</button>
<button onclick="buyTheme('red',500)">Червоний</button>
<button onclick="buyTheme('gold',1000)">Золотий</button>

<hr>

<h3>Адмін</h3>

<input id="adminPass" placeholder="Пароль адміна">
<input id="targetUser" placeholder="Ім'я гравця">
<input id="newRank" placeholder="Нове звання">
<input id="dbAmount" placeholder="DB">

<button onclick="adminEdit()">Оновити</button>
<script>

let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;

function saveUsers(){
localStorage.setItem("users", JSON.stringify(users));
}

function registerUser(){

const user = {
username: document.getElementById("username").value,
rank: document.getElementById("rank").value,
badge: document.getElementById("badge").value,
car: document.getElementById("car").value,
password: document.getElementById("password").value,
db:0,
bg:"green"
};

if(!user.username || !user.password){
alert("Заповни ім'я і пароль");
return;
}

if(users.find(u => u.username === user.username)){
alert("Користувач вже існує");
return;
}

users.push(user);
saveUsers();

alert("Реєстрація успішна");
}

function loginUser(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const found =
users.find(u =>
u.username === username &&
u.password === password
);

if(!found){
alert("Невірний логін або пароль");
return;
}

currentUser = found;

document.getElementById("auth").classList.add("hidden");
document.getElementById("portal").classList.remove("hidden");

updateProfile();
}

function updateProfile(){

document.body.style.background =
currentUser.bg;

document.getElementById("profile").innerHTML =

Ім'я: ${currentUser.username}<br>
Звання: ${currentUser.rank}<br>
Жетон: ${currentUser.badge}<br>
Авто: ${currentUser.car}
;

document.getElementById("db").innerText =
currentUser.db;
}

function buyTheme(color,price){

if(price>0 && currentUser.db < price){
alert("Недостатньо DB");
return;
}

currentUser.db -= price;
currentUser.bg = color;

saveUsers();
updateProfile();
}

function adminEdit(){

if(
document.getElementById("adminPass").value
!== "DBR2026"
){
alert("Невірний пароль");
return;
}

const target =
users.find(
u => u.username ===
document.getElementById("targetUser").value
);

if(!target){
alert("Гравця не знайдено");
return;
}

const rank =
document.getElementById("newRank").value;

if(rank){
target.rank = rank;
}

const amount =
Number(
document.getElementById("dbAmount").value || 0
);

target.db += amount;

saveUsers();

alert("Оновлено");
}

</script>

</div>
</body>
</html>
