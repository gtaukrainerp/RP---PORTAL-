<input id="username" placeholder="Ім'я">

<input id="roblox" placeholder="Roblox">
<input id="password" type="password" placeholder="Пароль">

<button onclick="register()">Реєстрація</button>
<button onclick="login()">Вхід</button>

</div>

<script>

let user=null;
let users=JSON.parse(localStorage.getItem("users")||"[]");

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
}

// REGISTER
function register(){

let u={
username:document.getElementById("username").value,
rank:document.getElementById("rank").value,
badge:document.getElementById("badge").value,
car:document.getElementById("car").value,
telegram:document.getElementById("tg").value,
tgname:document.getElementById("tgname").value,
roblox:document.getElementById("roblox").value,
password:document.getElementById("password").value
};

if(!u.username || !u.password){
alert("Заповни ім'я і пароль");
return;
}

if(users.find(x=>x.username===u.username)){
alert("Такий вже є");
return;
}

u.db=0;
u.bg="green";

users.push(u);
save();

alert("Реєстрація OK");
}
